name: ChemStack CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints-dev.txt -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy

      - name: Run tests with coverage gate
        run: pytest --cov --cov-report=term-missing -q

      - name: Package smoke
        run: |
          python -m pip wheel . --no-deps -w /tmp/chemstack-wheel-smoke
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("/tmp/chemstack-wheel-smoke").glob("chemstack-*.whl"))
          assert len(wheels) == 1, wheels
          with ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())
          assert "chemstack/py.typed" in names
          assert "chemstack/core/py.typed" not in names
          PY
